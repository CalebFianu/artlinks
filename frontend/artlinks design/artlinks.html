<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>artlinks — creator link manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gloock&family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600&family=Caveat:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=2" />
<style>
  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: var(--paper);
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 13px;
    box-shadow: 3px 3px 0 var(--ink-mute);
    z-index: 200;
    animation: toastIn 0.25s ease;
  }
  @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 8px); } to { opacity: 1; transform: translate(-50%, 0); } }
</style>
</head>
<body data-variant="notebook" data-density="comfortable">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components/icons.jsx"></script>
<script type="text/babel" src="components/app.jsx"></script>
<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "variant": "notebook",
  "theme": "light",
  "accent": "#8ec5ff",
  "strokeWeight": "medium",
  "density": "comfortable"
}/*EDITMODE-END*/;

function applyTweaks(t) {
  document.body.dataset.variant = t.variant;
  document.body.dataset.density = t.density;
  document.body.dataset.theme = t.theme || 'light';
  const root = document.documentElement;
  root.style.setProperty('--accent', t.accent);
  // Derive soft from accent
  root.style.setProperty('--accent-soft', t.accent + (t.theme === 'dark' ? '22' : '33'));
  const weights = { thin: '1.1px', medium: '1.6px', bold: '2.2px' };
  root.style.setProperty('--stroke', weights[t.strokeWeight] || '1.6px');
}

function Root() {
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  React.useEffect(() => applyTweaks(tweaks), [tweaks]);
  return <App tweaks={tweaks} setTweaks={setTweaks} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
